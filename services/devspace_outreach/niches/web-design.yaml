key: web-design
label: Web Design

search:
  queries:
    - 'small business "{location}" website'
    - 'local business "{location}" website'
    - 'contractor "{location}" website'
    - 'home services "{location}" website'
    - 'professional services "{location}" website'
    - 'restaurant "{location}" website'

locations:
  - Salt Lake City UT
  - Provo UT
  - Orem UT
  - Sandy UT
  - Draper UT
  - Ogden UT

pain_points:
  - key: slow_or_heavy_site
    label: Slow or heavy website
    weight: 25
    scan_for:
      - low_mobile_pagespeed
      - large_images
      - render_blocking_scripts

  - key: weak_search_presence
    label: Weak search presence
    weight: 20
    scan_for:
      - missing_city_keywords
      - weak_title_tag
      - missing_meta_description
      - missing_schema_markup

  - key: poor_lead_conversion
    label: Poor lead conversion
    weight: 25
    scan_for:
      - phone_number_not_prominent
      - weak_call_to_action
      - contact_form_hard_to_find

  - key: low_trust
    label: Low trust signals
    weight: 15
    scan_for:
      - missing_reviews
      - no_testimonials
      - no_before_after_or_patient_success_content

  - key: technical_issues
    label: Technical website issues
    weight: 15
    scan_for:
      - broken_links
      - missing_ssl
      - mobile_layout_issues
      - outdated_cms_signals

offer:
  primary_service: Website audit and redesign consultation
  pitch_angle: >
    Local businesses depend on a website that loads quickly, explains the offer
    clearly, and makes it easy for visitors to call, book, or request a quote.
    Small technical and conversion issues can quietly cost qualified leads.

scoring:
  min_score_to_save: 60
  min_score_to_email: 80

email:
  subject: "Quick website note for {company_name}"
  opening: >
    I was looking at local business websites around {location} and noticed a few
    things on {company_name}'s site that may be worth tightening up.
  value_prop: >
    The main things I look for are mobile speed, clear calls to action, local SEO
    basics, trust signals, and whether the site makes it easy for someone to get
    in touch.
  call_to_action: >
    Would you be open to me sending over a quick summary of what I found?
